<nav class="bg-white border-b border-orange-100 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16 items-center">
            
            <div class="flex items-center flex-1 md:flex-initial">
                <a href="/" class="flex-shrink-0 flex items-center mr-8">
                    <i data-lucide="shapes" class="text-orange-700 mr-2"></i>
                    <span class="text-xl font-bold tracking-wide text-orange-950 font-serif">ClayCanvas</span>
                </a>

                <div class="hidden md:flex space-x-6 font-medium">
                    <a href="/products/" class="{% if request.path == '/products/' and not request.GET.category %}text-orange-800 border-b-2 border-orange-700{% else %}text-stone-500 hover:text-orange-800{% endif %} px-1 pt-1 text-sm transition">Shop All</a>
                    <a href="/products/?category=paintings" class="{% if request.GET.category == 'paintings' %}text-orange-800 border-b-2 border-orange-700{% else %}text-stone-500 hover:text-orange-800{% endif %} px-1 pt-1 text-sm transition">Paintings</a>
                    <a href="/products/?category=pottery" class="{% if request.GET.category == 'pottery' %}text-orange-800 border-b-2 border-orange-700{% else %}text-stone-500 hover:text-orange-800{% endif %} px-1 pt-1 text-sm transition">Pottery</a>
                    <a href="/products/?category=accessories" class="{% if request.GET.category == 'accessories' %}text-orange-800 border-b-2 border-orange-700{% else %}text-stone-500 hover:text-orange-800{% endif %} px-1 pt-1 text-sm transition">Accessories</a>
                </div>
            </div>

            <div class="hidden sm:block flex-1 max-w-md mx-8">
                <form action="/products/" method="GET" class="relative m-0">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-4 w-4 text-stone-400"></i>
                    </div>
                    <input type="text" name="q" value="{{ request.GET.q|default:'' }}" placeholder="Search paintings, pottery..." class="block w-full pl-9 pr-3 py-1.5 border border-orange-100 rounded-lg bg-stone-50 text-sm placeholder-stone-400 focus:outline-none focus:border-orange-400 focus:bg-white text-stone-800 transition">
                </form>
            </div>

            <div class="flex items-center space-x-4">
                <a href="/products/" class="text-stone-600 hover:text-orange-800 transition sm:hidden">
                    <i data-lucide="search"></i>
                </a>
                <a href="/wishlist/" class="text-stone-600 hover:text-orange-800 transition relative">
                    <i data-lucide="heart"></i>
                </a>
                <a href="/cart/" class="text-stone-600 hover:text-orange-800 transition relative mr-2">
                    <i data-lucide="shopping-basket"></i>
                </a>

                {% if user.is_authenticated %}
                    <div class="flex items-center space-x-3 border-l border-orange-100 pl-4">
                        <a href="/profile/" class="block h-8 w-8 rounded-full overflow-hidden border border-orange-200 bg-orange-50 focus:outline-none">
                            {% if user.profile_picture %}
                                <img src="{{ user.profile_picture.url }}" alt="{{ user.username }}" class="h-full w-full object-cover">
                            {% else %}
                                <div class="h-full w-full flex items-center justify-center text-orange-800 font-bold text-sm bg-amber-100">
                                    {{ user.username|slice:":1"|upper }}
                                </div>
                            {% endif %}
                        </a>
                        <a href="/logout/" class="text-stone-600 hover:text-red-700 transition" title="Logout">
                            <i data-lucide="log-out"></i>
                        </a>
                    </div>
                {% else %}
                    <div class="flex items-center space-x-2 border-l border-orange-100 pl-4">
                        <a href="/login/" class="text-stone-600 hover:text-orange-800 text-sm font-medium px-2 py-1.5 transition">Login</a>
                        <a href="/register/" class="bg-orange-700 text-white text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-orange-800 transition shadow-sm">Register</a>
                    </div>
                {% endif %}
            </div>

        </div>
    </div>
</nav>
